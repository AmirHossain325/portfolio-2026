<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir Hossain | Security Engineer Portfolio</title>
    <link rel="stylesheet" href="source/css/style.css">
</head>
<body>
    <!-- 3D Canvas Background -->
    <canvas id="webgl-canvas"></canvas>
    
    <!-- Retro Terminal Background -->
    <div class="retro-terminal">
        <div class="matrix-rain"></div>
        <div class="terminal-overlay">
            <div class="terminal-header">
                <div class="terminal-buttons">
                    <div class="terminal-btn minimize"></div>
                    <div class="terminal-btn maximize"></div>
                    <div class="terminal-btn close"></div>
                </div>

            </div>

        </div>
    </div>
    
    <!-- Futuristic HUD Overlay -->
    <div class="hud-overlay">
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div>
        <div class="hud-corner bottom-right"></div>
        <div class="scan-line"></div>
    </div>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loader-ring"></div>
            <div class="loading-text">INITIALIZING SECURITY PROTOCOL</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-percentage">0%</div>
        </div>
    </div>
    
    <!-- Navigation -->
    <nav class="nav-container navbar-enhanced">
        <div class="navbar-content">
            <div class="navbar-left">
                <div class="logo">
                    <span class="logo-bracket">[</span>
                    <span class="logo-text">Amir Hossain</span>
                    <span class="logo-bracket"></span>
                </div>
            </div>
            <ul class="nav-menu">
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#skills" class="nav-link">Skills</a></li>
                <li><a href="#projects" class="nav-link">Projects</a></li>
                <li><a href="#certifications" class="nav-link">Certifications</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="navbar-right">
                <div class="status-indicator online"></div>
                <span class="status-text">ONLINE</span>
            </div>
        </div>
        <div class="navbar-glow"></div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- About Me Section -->
        <section id="about" class="section about-section">
            <div class="container">
                <h1 class="section-title">About Me</h1>
                <div id="about-content" class="content-wrapper">
                    <!-- Loaded from about.js -->
                </div>
            </div>
        </section>

        <!-- Skills Inventory Section -->
        <section id="skills" class="section skills-section">
            <div class="container">
                <h1 class="section-title">Skills Inventory</h1>
                <div id="skills-content" class="content-wrapper">
                    <!-- Loaded from skills.js -->
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="section projects-section">
            <div class="container">
                <h1 class="section-title">Projects</h1>
                <div id="projects-content" class="content-wrapper">
                    <!-- Loaded from projects.js -->
                </div>
            </div>
        </section>

        <!-- Certifications Section -->
        <section id="certifications" class="section certifications-section">
            <div class="container">
                <h1 class="section-title">Certifications</h1>
                <div id="certifications-content" class="content-wrapper">
                    <!-- Loaded from certifications.js -->
                </div>
            </div>
        </section>

        <!-- Contacts and Links Section -->
        <section id="contact" class="section contact-section">
            <div class="container">
                <h1 class="section-title">Contact & Links</h1>
                <div id="contact-content" class="content-wrapper">
                    <!-- Loaded from contacts.js -->
                </div>
            </div>
        </section>
    </main>

    <!-- Three.js and Add-ons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Application Scripts -->
    <script src="source/js/main.js" type="module"></script>
    <script src="source/js/sections/about.js" type="module"></script>
    <script src="source/js/sections/skills.js" type="module"></script>
    <script src="source/js/sections/projects.js" type="module"></script>
    <script src="source/js/sections/certifications.js" type="module"></script>
    <script src="source/js/sections/contacts.js" type="module"></script>
    <script src="source/js/animations.js" type="module"></script>
</body>
</html>
